<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LibreYOLO Web - Multi-Family Detection Demo</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        .container { position: relative; margin-top: 20px; }
        #output-canvas { position: absolute; top: 0; left: 0; pointer-events: none; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        select { padding: 8px; font-size: 14px; }
        #status { margin-left: 10px; }
        .info { background: #f5f5f5; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 14px; }
        code { background: #e0e0e0; padding: 2px 6px; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>LibreYOLO Web</h1>
    <p>Multi-family object detection in the browser. Supports YOLOX, YOLO9, RF-DETR, and YOLOv8/v11/v26.</p>

    <div class="info">
        <code>npm install libreyolo-web onnxruntime-web</code><br><br>
        <code>const model = await loadModel('./model.onnx', { modelFamily: 'yolox' });</code><br>
        <code>const result = await model.predict(imageElement);</code>
    </div>

    <div class="controls">
        <button id="run-btn" disabled>Loading Model...</button>
        <span id="status">Initializing...</span>
    </div>

    <div class="container">
        <img id="input-image" src="./public/test_image.jpg" alt="Input" style="max-width: 100%; display: block;">
        <canvas id="output-canvas"></canvas>
    </div>

    <script type="module">
        import { LIBREYOLO, BoxOverlay } from '../../src/index.ts';

        const statusEl = document.getElementById('status');
        const runBtn = document.getElementById('run-btn');
        const img = document.getElementById('input-image');
        const canvas = document.getElementById('output-canvas');

        const model = new LIBREYOLO('./public/yolov8n.onnx', {
            confThres: 0.25,
            iouThres: 0.45,
            device: 'auto'
        });

        const overlay = new BoxOverlay({
            canvas: canvas,
            lineWidth: 3,
            fontSize: 18,
            showLabels: true,
            showConfidence: true
        });

        function resizeCanvas() {
            canvas.width = img.clientWidth;
            canvas.height = img.clientHeight;
        }

        img.onload = resizeCanvas;
        window.addEventListener('resize', resizeCanvas);

        async function init() {
            try {
                statusEl.textContent = 'Loading model...';
                await model.init();
                statusEl.textContent = `Ready! (${model.provider}, family: ${model.modelFamily})`;
                runBtn.textContent = 'Run Detection';
                runBtn.disabled = false;
            } catch (err) {
                console.error(err);
                statusEl.textContent = `Error: ${err.message}`;
                statusEl.style.color = 'red';
            }
        }

        runBtn.addEventListener('click', async () => {
            if (runBtn.disabled) return;

            try {
                statusEl.textContent = 'Running inference...';
                runBtn.disabled = true;

                const start = performance.now();
                const result = await model.predict(img);
                const end = performance.now();

                overlay.draw(result.detections, {
                    originalWidth: img.naturalWidth,
                    originalHeight: img.naturalHeight
                });

                const time = (end - start).toFixed(1);
                statusEl.textContent = `Found ${result.numDetections} objects in ${time}ms (${model.provider})`;

                console.log('Detection result:', result);
            } catch (err) {
                console.error(err);
                statusEl.textContent = `Inference Error: ${err.message}`;
            } finally {
                runBtn.disabled = false;
            }
        });

        init();
    </script>
</body>
</html>
